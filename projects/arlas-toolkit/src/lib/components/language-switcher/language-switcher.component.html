<mat-select class="language-picker" [(value)]="currentLanguage"
  [disableOptionCentering]="true" [panelClass]="'language-picker__panel'">
  <mat-select-trigger class="language-picker__trigger">
    <span class="flag-icon flag-{{currentLanguage}}"></span>
  </mat-select-trigger>
  @for (lang of availablesLanguages; track lang) {
    <mat-option (click)="setLanguage(lang)" (keydown)="setLanguage(lang)" [value]="lang" class="switcher-option">
      <span class="flag-icon flag-{{lang}}"></span>
    </mat-option>
  }
</mat-select>
