<h2 mat-dialog-title>
  <mat-icon class="confirm__icon">warning</mat-icon>
  {{ 'CAUTION' | translate }}
</h2>
<mat-dialog-content class="confirm__content" [innerHTML]="confirmHTLMMessage">
  {{ confirmMessage | translate }}
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton="outlined" [mat-dialog-close]="false">{{ 'No' | translate }}</button>
  <button matButton="filled" color="warn" [mat-dialog-close]="true">{{ 'Yes' | translate }}</button>
</mat-dialog-actions>
