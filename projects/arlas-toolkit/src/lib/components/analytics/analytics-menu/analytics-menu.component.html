<mat-action-list class="analytics-menu" [class.analytics-menu--unselected]="!analyticsService.activeTab">
  @for (tab of analyticsService.tabs; track tab; let tabIdx = $index) {
    <button mat-list-item (click)="selectTab(tabIdx)">
      @if (tab.icon) {
        <mat-icon [matTooltip]="tab.name | translate" matTooltipPosition="right"
          class="tab-icon" [class.tab--selected]="tabIdx === analyticsService.activeTab">
          {{ tab.icon }}
        </mat-icon>
      } @else {
        <div [matTooltip]="tab.name | translate"  matTooltipPosition="right"
          [class.tab--selected]="tabIdx === analyticsService.activeTab">
          {{ tab.name[0] }}
        </div>
      }

      @if (showIndicators && analyticsService.activeFilterTab.get(tab.name)) {
        <button mat-icon-button class="active-filter-tab" (click)="removeTabFilter(tab.name, $event);">
          <mat-icon class="active-filter-tab-close"
            [matTooltip]="'Click to remove all filters of this tab' | translate"
            matTooltipPosition="right">clear</mat-icon>
        </button>
      }
    </button>
  }
</mat-action-list>
