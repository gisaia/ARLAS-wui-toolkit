<div mat-dialog-title class="title">{{arlasError?.title| translate}}</div>
<mat-dialog-content class="content">
  <div class="errored">
    <div><mat-icon class="icon">error</mat-icon></div>
    <div class="state">{{arlasError?.message | translate:{service: $any(arlasError)?.service | translate} }}</div>
    @if (arlasError?.showAction) {
      <button matButton="filled" color="primary" [class.action]="arlasError.actionType === 'link'" (click)="arlasError.executeAction()">
        {{arlasError?.actionMessage | translate}}
      </button>
    }
  </div>
</mat-dialog-content>

@if (!forceAction) {
  <mat-dialog-actions class="actions">
    <button mat-stroked-button [mat-dialog-close]="true">{{'Close' | translate}}</button>
  </mat-dialog-actions>
}
