<div mat-dialog-title class="title">{{arlasError?.title| translate}}</div>
<mat-dialog-content class="content">
  <div class="errored">
    <div><mat-icon class="icon">error</mat-icon></div>
    <div class="state">{{arlasError?.message | translate:{service: $any(arlasError)?.service | translate} }}</div>
    @if (arlasError?.actionType === 'link') {
      @if (arlasError?.showAction) {
        <button mat-button class="action" (click)="arlasError.executeAction()">
          {{arlasError?.actionMessage | translate }}
        </button>
      }
    } @else {
      @if (arlasError?.showAction) {
        <button mat-stroked-button (click)="arlasError.executeAction()">{{arlasError?.actionMessage | translate}}</button>
      }
    }
  </div>
</mat-dialog-content>

@if (!forceAction) {
  <mat-dialog-actions class="actions">
    <button mat-button [mat-dialog-close]="true">{{'Close' | translate}}</button>
  </mat-dialog-actions>
}
