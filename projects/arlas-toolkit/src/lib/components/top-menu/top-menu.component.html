<mat-toolbar class="top-menu">
  <!-- Insert on the left -->
  <ng-content select="[left-menu]"></ng-content>
  <span class="spacer"></span>

  <!-- Insert in the middle -->
  <ng-content select="[middle-menu]"></ng-content>

  <span class="spacer"></span>
  <!-- Insert on the right -->
  <ng-content select="[right-menu]"></ng-content>

  <!-- Information -->
  @if (showAboutButton) {
    <button mat-icon-button matTooltip="{{ 'About' | translate }} {{ wuiName }} {{ version }}"
      (click)="displayAbout()">
      <mat-icon class="icon">info_outline</mat-icon>
    </button>
  }

  <!-- Page Switcher-->
  @if (linksEnabled) {
    <button mat-icon-button matTooltip="{{ 'Go to' | translate }}"
      (click)="showLinks = !showLinks; $event.stopPropagation()">
      <mat-icon class="icon">apps</mat-icon>
    </button>
  }

  <!-- User info and login -->
  @if (connected && isAuthentActivated) {
    <button mat-icon-button matTooltip="{{'My account' | translate}}"
      [matMenuTriggerFor]="actionMenu" class="action-menu-button">
      @if (authentMode !== 'iam' && !!avatar) {
        <img src="{{avatar}}" class="user_avatar">
      } @else {
        <div class="avatar">
          {{initials | uppercase}}
        </div>
      }
    </button>
  }
  <mat-menu #actionMenu="matMenu">
    <button mat-menu-item (click)="getUserInfos()">
      <mat-icon>person</mat-icon>
      <span>{{ 'Your profile' | translate }}</span>
    </button>
    @if (authentMode === 'iam') {
      <button mat-menu-item (click)="changePassword()">
        <mat-icon>password</mat-icon>
        <span>{{ 'Change my password' | translate }}</span>
      </button>
    }
    <button mat-menu-item (click)="connect()">
      <mat-icon>logout</mat-icon>
      <span>{{ 'Logout' | translate }}</span>
    </button>
  </mat-menu>

  @if (!connected && isAuthentActivated) {
    <button mat-icon-button [matTooltip]="'Log In' | translate"
      (click)="connect()">
      <mat-icon class="icon">account_circle</mat-icon>
    </button>
  }

</mat-toolbar>

<arlas-about #about [pathToMd]="aboutFile" [extraTextData]="extraAboutText"></arlas-about>
@if (linksEnabled && showLinks) {
  <arlas-links (close$)="showLinks = false"></arlas-links>
}
