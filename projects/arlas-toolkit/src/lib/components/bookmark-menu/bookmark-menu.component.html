<mat-menu #menu="matMenu">
  <div class="add">
    <button mat-menu-item (click)="openDialogAdd()" [class.full-width]="!addBookmarkDisabled" [disabled]="addBookmarkDisabled">
      <mat-icon>bookmark_add</mat-icon>
      <span>{{ "Add a dataset" | translate }}</span>
    </button>
    @if (addBookmarkDisabled) {
      <mat-icon class="info" [matTooltip]="infoMessage | translate: { maxBookmarks: bookmarkService.maxSize}"
      matTooltipClass="allow-breakline" >info_outlined</mat-icon>
    }
  </div>
  <button mat-menu-item (click)="openDatasetListDialog()">
    <mat-icon>{{icon}}</mat-icon>
    <span>{{ 'Manage datasets' | translate }}</span>
  </button>
</mat-menu>
