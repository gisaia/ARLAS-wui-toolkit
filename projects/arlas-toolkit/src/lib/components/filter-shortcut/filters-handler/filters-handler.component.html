<div class="container">
  @if (!!firstLabel && displayFilterFirstValue) {
    <arlas-filter-shortcut-chip
      [@fadeInOut]
      [hide]="moreClicked"
      [label]="firstLabel"
      [shortenValues]="!histogramDatatype"
      (clearEmitter)="clearFilter($event, 0)"></arlas-filter-shortcut-chip>
  }
  @if (showMore) {
    <button mat-icon-button class="more" [@fadeInOut] [class.more--expanded]="moreClicked" (click)="showFilters($event)">
      @if (moreClicked) {
        <mat-icon [@fadeInOut] class="collapse">expand_less</mat-icon>
      } @else {
        <span [@fadeInOut]>{{displayFilterFirstValue ? (labels?.length - 1) : labels?.length}}</span>
      }
    </button>
  }
  @if (moreClicked) {
    <div class="list" [@fadeInOut]>
      @for (label of labels; track label) {
        <div class="filter">
          <arlas-filter-shortcut-chip
            [label]="label"
            [shortenValues]="!histogramDatatype"
            (clearEmitter)="clearFilter($event, $index)"
          ></arlas-filter-shortcut-chip>
        </div>
      }
    </div>
  }
</div>
