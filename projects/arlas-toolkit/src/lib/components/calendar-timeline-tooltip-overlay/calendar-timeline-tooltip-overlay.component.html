<div class="wrapper">
  <div class="xline" style="margin-bottom: 5px;">
    <div class="title">
      <div >{{tooltip?.stringDate}}</div>
      @if (tooltip?.data?.metadata?.name) {
        <div class="category">{{tooltip.data.metadata.name}}</div>
      }
    </div>

    @if (tooltip?.data?.metadata?.thumbnail) {
      <div class="image">
        <img src="{{tooltip.data.metadata.thumbnail}}" width="250">
      </div>
    }
  </div>
</div>
